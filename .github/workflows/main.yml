name: Bone Fracture Detection CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Fix Node 24 warning

    steps:
    # 📥 Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🐍 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ⚙️ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🤖 Install PyTorch (CPU version)
    - name: Install PyTorch (CPU)
      run: |
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

    # 🧪 Basic test
    - name: Run basic test
      run: |
        python -c "print('CI pipeline running successfully 🚀')"

    # 🌐 Optional: Test Flask app startup
    - name: Test Flask app (optional)
      run: |
        export FLASK_APP=app.py
        flask run &
        sleep 5
