<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bone Fracture Detection - Image Prediction</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="../static/assets/css/all.min.css">
<link rel="stylesheet" href="../static/assets/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="../static/assets/css/owl.carousel.css">
<link rel="stylesheet" href="../static/assets/css/magnific-popup.css">
<link rel="stylesheet" href="../static/assets/css/animate.css">
<link rel="stylesheet" href="../static/assets/css/meanmenu.min.css">
<link rel="stylesheet" href="../static/assets/css/image.css">
<link rel="stylesheet" href="../static/assets/css/responsive.css">

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        const output = document.getElementById('preview');
        output.src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</head>

<body>

<!-- Header -->
<div class="top-header-area" id="sticker">
    <div class="container text-center">
        <nav class="main-menu">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="image.html">Image Prediction</a></li>
                <li><a href="#">Webcam Prediction</a></li>
                <li><a href="#">Performance</a></li>
            </ul>
        </nav>
    </div>
</div>

<!-- Breadcrumb -->
<div class="breadcrumb-section breadcrumb-bg">
    <div class="container text-center">
        <p>Bone Fracture Detection</p>
        <h1>Image Prediction</h1>
    </div>
</div>

<!-- Upload Section -->
<div class="mt-150">
    <div class="container text-center">

        <h3>Image <span class="orange-text">Prediction</span></h3>
        <p>Upload X-ray image</p>

        <div style="max-width:400px;margin:auto;">

            <input type="file" class="form-control" accept="image/*" onchange="previewImage(event)">
            <br><br>

            <img id="preview" width="100%" style="border-radius:10px"/>

            <br><br>

            <button class="btn btn-primary" onclick="alert('Backend not connected')">
                Predict
            </button>

        </div>

    </div>
</div>

<!-- Footer -->
<div class="footer-area">
    <div class="container"></div>
</div>

<!-- JS -->
<script src="../static/assets/js/jquery-1.11.3.min.js"></script>
<script src="../static/assets/bootstrap/js/bootstrap.min.js"></script>
<script src="../static/assets/js/main.js"></script>

</body>
</html>
