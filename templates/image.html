<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bone Fracture Detection - Image</title>

<!-- CSS -->
<link rel="stylesheet" href="../static/assets/css/all.min.css">
<link rel="stylesheet" href="../static/assets/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="../static/assets/css/image.css">

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</head>

<body>

<!-- Navbar -->
<nav style="text-align:center; padding:15px;">
    <a href="../index.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="image.html">Image</a> |
    <a href="webcam.html">Webcam</a>
</nav>

<h2 style="text-align:center;">Image Prediction</h2>

<div style="max-width:400px;margin:auto;text-align:center;">

    <input type="file" accept="image/*" onchange="previewImage(event)">
    <br><br>

    <img id="preview" width="100%"/>

    <br><br>

    <button onclick="alert('Backend not connected')">Predict</button>

</div>

</body>
</html>
